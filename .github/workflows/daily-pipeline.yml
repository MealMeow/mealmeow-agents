name: Daily Agent Pipeline

on:
  schedule:
    # Run Monday-Friday at 8:00 AM UTC
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      agents:
        description: 'Comma-separated agents to run (research,database,learn,display,meta)'
        required: false
        default: 'research,database,learn,meta'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  research:
    name: Research Agent
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      contains(github.event.inputs.agents, 'research')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Research Agent
        run: node agents/research-agent/run.js
        timeout-minutes: 30

      - name: Upload research output
        uses: actions/upload-artifact@v4
        with:
          name: research-output
          path: logs/research-*.json
          retention-days: 30

  database:
    name: Database Agent
    runs-on: ubuntu-latest
    needs: research
    if: >
      github.event_name == 'schedule' ||
      contains(github.event.inputs.agents, 'database')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Download research output
        uses: actions/download-artifact@v4
        with:
          name: research-output
          path: logs/

      - name: Run Database Agent
        run: node agents/database-agent/run.js
        timeout-minutes: 15

      - name: Upload database log
        uses: actions/upload-artifact@v4
        with:
          name: database-log
          path: logs/database-*.log
          retention-days: 30

  learn:
    name: Learn Agent
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      contains(github.event.inputs.agents, 'learn')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Learn Agent
        run: node agents/learn-agent/run.js
        timeout-minutes: 20

      - name: Upload learn log
        uses: actions/upload-artifact@v4
        with:
          name: learn-log
          path: logs/learn-*.log
          retention-days: 30

  meta:
    name: Meta Agent
    runs-on: ubuntu-latest
    needs: [research, database, learn]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: logs/

      - name: Run Meta Agent
        run: node agents/meta-agent/run.js
        timeout-minutes: 10

      - name: Send daily report
        run: node scripts/send-report.js
        env:
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}

      - name: Commit state updates
        run: |
          git config user.name "MealMeow Bot"
          git config user.email "bot@mealmeow.com"
          git add knowledge/ agents/*/task-queue.md logs/
          git diff --staged --quiet || git commit -m "chore: update state after pipeline run $(date +%Y-%m-%d)"
          git push
